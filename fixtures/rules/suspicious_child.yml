title: Suspicious Office Child Process
id: 22222222-2222-2222-2222-222222222222
status: test
description: Detects a scripting host (wscript) spawned by an Office application, a common phishing payload pattern.
author: rsigma-action fixtures
date: 2026-06-26
references:
  - https://attack.mitre.org/techniques/T1204/002/
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    ParentImage|endswith:
      - '\winword.exe'
      - '\excel.exe'
    Image|endswith: '\wscript.exe'
  condition: selection
falsepositives:
  - Office automation macros in trusted documents
level: medium
tags:
  - attack.execution
  - attack.t1059
  - attack.t1204.002
