# RSigma Detection-as-Code (DaC) composite action.
#
# Steps are transparent shell, so there is no Node runtime to maintain and the
# action inherits the runner OS (rsigma ships binaries for all six targets).
# Every `${{ ... }}` value reaches a script through `env:`, never inlined into a
# `run:` body, so `zizmor --pedantic` finds no template-injection surface.
name: RSigma Detection-as-Code
description: Lint, validate, fields-drift, backtest, and ATT&CK coverage gate for Sigma rules, powered by rsigma.
author: Tiger Data

branding:
  icon: shield
  color: purple

inputs:
  version:
    description: rsigma release to install (e.g. v0.17.0). `latest` resolves the newest release once, then pins it for the cache key. Pinning a tag is recommended.
    required: false
    default: latest
  rules:
    description: Rule file or directory, passed to every step.
    required: false
    default: rules/
  pipelines:
    description: Pipeline names or paths (one per line), forwarded as repeated `-p` to validate, backtest, and the fields diff.
    required: false
    default: ""
  working-directory:
    description: Repo-relative root for all paths.
    required: false
    default: "."
  lint:
    description: Run the lint step.
    required: false
    default: "true"
  validate:
    description: Run the validate step.
    required: false
    default: "true"
  fields-diff:
    description: Run the merge-base fields-drift diff (pull requests only).
    required: false
    default: "true"
  lint-fail-level:
    description: Forwarded to `rule lint --fail-level` (error/warning/info). The CLI default is `error`; this action defaults to the stricter `warning`.
    required: false
    default: warning
  sources:
    description: Dynamic-source files or directories (one per line) for `rule validate --resolve-sources --source ...`.
    required: false
    default: ""
  corpus:
    description: Backtest corpus file or directory (one per line). The backtest step runs only when this is set.
    required: false
    default: ""
  expectations:
    description: Expectations YAML, forwarded to `rule backtest --expectations`.
    required: false
    default: ""
  unexpected:
    description: Forwarded to `rule backtest --unexpected` (fail/warn/ignore).
    required: false
    default: warn
  coverage:
    description: Run the ATT&CK coverage step.
    required: false
    default: "false"
  coverage-targets:
    description: Target technique list, forwarded to `rule coverage --targets`.
    required: false
    default: ""
  coverage-baseline:
    description: Baseline Navigator layer for `rule coverage --baseline`. Use `true` for the upstream SigmaHQ default, or a path/URL.
    required: false
    default: ""
  coverage-atomics:
    description: Atomic Red Team index for `rule coverage --atomics`. Use `true` for the upstream default, or a path/URL/directory.
    required: false
    default: ""
  fail-on-gaps:
    description: Forwarded to `rule coverage --fail-on-gaps`; fails the gate when a requested cross-reference reports uncovered techniques.
    required: false
    default: "false"
  annotations:
    description: Emit workflow-command annotations on the PR diff.
    required: false
    default: "true"
  pr-comment:
    description: Maintain the sticky summary comment on pull requests.
    required: false
    default: "true"
  github-token:
    description: "Token used to download the rsigma release, verify its attestation, and upsert the PR comment. Needs `pull-requests: write` for the comment."
    required: false
    default: ${{ github.token }}

outputs:
  rsigma-version:
    description: The resolved rsigma version that ran.
    value: ${{ steps.resolve.outputs.version }}
  lint-errors:
    description: Lint error count from the JSON envelope summary.
    value: ${{ steps.lint.outputs.errors }}
  lint-warnings:
    description: Lint warning count from the JSON envelope summary.
    value: ${{ steps.lint.outputs.warnings }}
  backtest-passed:
    description: "`true` when the backtest ran and all expectations passed, `false` otherwise."
    value: ${{ steps.backtest.outputs.passed }}
  junit-path:
    description: Path to the backtest JUnit XML report, if produced.
    value: ${{ steps.backtest.outputs.junit-path }}
  report-path:
    description: Path to the backtest JSON report, if produced.
    value: ${{ steps.backtest.outputs.report-path }}
  navigator-path:
    description: Path to the coverage ATT&CK Navigator layer, if produced.
    value: ${{ steps.coverage.outputs.navigator-path }}
  fields-added:
    description: Number of rule fields added relative to the merge-base.
    value: ${{ steps.fields.outputs.added }}
  fields-removed:
    description: Number of rule fields removed relative to the merge-base.
    value: ${{ steps.fields.outputs.removed }}

runs:
  using: composite
  steps:
    - name: Resolve rsigma version and target
      id: resolve
      shell: bash
      env:
        RSIGMA_VERSION_INPUT: ${{ inputs.version }}
        RSIGMA_REPO: timescale/rsigma
        GH_TOKEN: ${{ inputs.github-token }}
      run: bash "$GITHUB_ACTION_PATH/scripts/resolve.sh"

    - name: Cache rsigma binary
      id: cache
      uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
      with:
        path: ${{ env.RSIGMA_BIN_DIR }}
        key: rsigma-${{ steps.resolve.outputs.version }}-${{ steps.resolve.outputs.target }}

    - name: Install rsigma
      shell: bash
      env:
        RSIGMA_VERSION: ${{ steps.resolve.outputs.version }}
        RSIGMA_REPO: timescale/rsigma
        CACHE_HIT: ${{ steps.cache.outputs.cache-hit }}
        GH_TOKEN: ${{ inputs.github-token }}
      run: bash "$GITHUB_ACTION_PATH/scripts/install.sh"

    - name: Lint
      id: lint
      if: ${{ inputs.lint == 'true' }}
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        RSIGMA_RULES: ${{ inputs.rules }}
        RSIGMA_FAIL_LEVEL: ${{ inputs.lint-fail-level }}
        RSIGMA_ANNOTATIONS: ${{ inputs.annotations }}
      run: bash "$GITHUB_ACTION_PATH/scripts/lint.sh"

    - name: Validate
      id: validate
      if: ${{ inputs.validate == 'true' }}
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        RSIGMA_RULES: ${{ inputs.rules }}
        RSIGMA_PIPELINES: ${{ inputs.pipelines }}
        RSIGMA_SOURCES: ${{ inputs.sources }}
        RSIGMA_ANNOTATIONS: ${{ inputs.annotations }}
      run: bash "$GITHUB_ACTION_PATH/scripts/validate.sh"

    - name: Fields drift
      id: fields
      if: ${{ inputs.fields-diff == 'true' && github.event_name == 'pull_request' }}
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        RSIGMA_RULES: ${{ inputs.rules }}
        RSIGMA_PIPELINES: ${{ inputs.pipelines }}
        BASE_SHA: ${{ github.event.pull_request.base.sha }}
      run: bash "$GITHUB_ACTION_PATH/scripts/fields-diff.sh"

    - name: Backtest
      id: backtest
      if: ${{ inputs.corpus != '' }}
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        RSIGMA_RULES: ${{ inputs.rules }}
        RSIGMA_CORPUS: ${{ inputs.corpus }}
        RSIGMA_EXPECTATIONS: ${{ inputs.expectations }}
        RSIGMA_UNEXPECTED: ${{ inputs.unexpected }}
        RSIGMA_PIPELINES: ${{ inputs.pipelines }}
        RSIGMA_ANNOTATIONS: ${{ inputs.annotations }}
      run: bash "$GITHUB_ACTION_PATH/scripts/backtest.sh"

    - name: Coverage
      id: coverage
      if: ${{ inputs.coverage == 'true' }}
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        RSIGMA_RULES: ${{ inputs.rules }}
        RSIGMA_COVERAGE_TARGETS: ${{ inputs.coverage-targets }}
        RSIGMA_COVERAGE_BASELINE: ${{ inputs.coverage-baseline }}
        RSIGMA_COVERAGE_ATOMICS: ${{ inputs.coverage-atomics }}
        RSIGMA_FAIL_ON_GAPS: ${{ inputs.fail-on-gaps }}
        RSIGMA_ANNOTATIONS: ${{ inputs.annotations }}
      run: bash "$GITHUB_ACTION_PATH/scripts/coverage.sh"

    # The artifacts dir lives under RUNNER_TEMP (outside the workspace, so
    # hashFiles cannot gate on it); `if-no-files-found: ignore` handles the
    # case where no backtest/coverage report was produced.
    - name: Upload reports
      if: ${{ always() }}
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: rsigma-reports
        path: ${{ env.RSIGMA_ARTIFACTS }}
        if-no-files-found: ignore

    - name: Render and post PR comment
      if: ${{ always() && inputs.pr-comment == 'true' && github.event_name == 'pull_request' }}
      shell: bash
      env:
        RSIGMA_VERSION: ${{ steps.resolve.outputs.version }}
        RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        REPO: ${{ github.repository }}
        GH_TOKEN: ${{ inputs.github-token }}
      run: bash "$GITHUB_ACTION_PATH/scripts/pr-comment.sh"

    - name: Gate
      if: ${{ always() }}
      shell: bash
      run: bash "$GITHUB_ACTION_PATH/scripts/gate.sh"
